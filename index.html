<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday Pagli Yousa 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    height: 100vh;
    overflow: hidden;
    font-family: 'Poppins', sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(-45deg, #ff9a9e, #ff6ec4, #fbc2eb, #a18cd1);
    background-size: 400% 400%;
    animation: bgMove 12s ease infinite;
}

@keyframes bgMove {
    0% { background-position: 0% }
    50% { background-position: 100% }
    100% { background-position: 0% }
}

.card {
    text-align: center;
    padding: 45px;
    border-radius: 25px;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(15px);
    box-shadow: 0 0 40px rgba(0,0,0,0.3);
    max-width: 650px;
    color: white;
}

h1 {
    font-family: 'Pacifico', cursive;
    font-size: 50px;
    margin-bottom: 10px;
    text-shadow: 0 0 20px #fff;
}

h2 {
    font-size: 28px;
    color: #fff0f5;
}

p {
    font-size: 18px;
    line-height: 1.7;
}

button {
    margin-top: 20px;
    padding: 12px 28px;
    border: none;
    border-radius: 30px;
    background: #ff4d88;
    color: white;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #ff1a66;
    transform: scale(1.1);
}

/* Floating hearts */
.heart {
    position: absolute;
    font-size: 18px;
    animation: float 6s linear infinite;
}

@keyframes float {
    0% { transform: translateY(100vh); opacity: 0; }
    50% { opacity: 1; }
    100% { transform: translateY(-10vh); opacity: 0; }
}

/* Popup */
.popup {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
    display: flex;
    justify-content: center;
    align-items: center;
    opacity: 0;
    pointer-events: none;
    transition: 0.4s;
}

.popup.active {
    opacity: 1;
    pointer-events: all;
}

.popup-box {
    background: linear-gradient(135deg, #ff4d88, #ff99cc);
    padding: 45px;
    border-radius: 20px;
    text-align: center;
    color: white;
    font-size: 36px;
    font-family: 'Poppins', sans-serif;
    font-weight: 600;
    letter-spacing: 3px;
    box-shadow: 0 0 30px #ff69b4;
    animation: pop 0.4s ease;
}

/* Cute text animation */
.kiss {
    display: inline-block;
    animation: bounce 0.6s infinite alternate;
}

@keyframes bounce {
    from { transform: translateY(0px); }
    to { transform: translateY(-10px); }
}

@keyframes pop {
    from { transform: scale(0.5); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
}

.close-btn {
    margin-top: 20px;
    font-size: 14px;
    padding: 8px 20px;
}
</style>
</head>

<body>

<div class="card">
    <h1>🎉 Happy Birthday 🎂</h1>
    <h2>My Cute Pagli Yousa 💕</h2>

    <p>
        You are my happiness, my peace, my everything 💖<br><br>
        Your smile is my favorite thing in this world 😍<br><br>
        I love you forever and ever my Pagli 🥺💗
    </p>

    <button onclick="showSurprise()">💌 Surprise</button>
</div>

<!-- Popup -->
<div class="popup" id="popup">
    <div class="popup-box">
        <span class="kiss">💋 MWAHHHHHH BOU 💖</span>
        <br><br>
        <button class="close-btn" onclick="closeSurprise()">Close 💕</button>
    </div>
</div>

<script>
// floating hearts
for (let i = 0; i < 40; i++) {
    let heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "💖";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.animationDuration = (3 + Math.random() * 3) + "s";
    document.body.appendChild(heart);
}

// popup
function showSurprise() {
    document.getElementById("popup").classList.add("active");
}

function closeSurprise() {
    document.getElementById("popup").classList.remove("active");
}
</script>

</body>
</html>
